<!DOCTYPE html>
<html>
<head>
  <title>Mi Página Web</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <header>
    <h1>Mi Página Web</h1>
    <p>Desarrollador web y diseñador gráfico</p>
    <button class="btn">Descubre más</button>
  </header>
  <section class="about" id="about">
    <h2>Acerca de mí</h2>
    <p>Soy un desarrollador web y diseñador gráfico con experiencia en HTML, CSS y JavaScript.</p>
    <img src="imagen.jpg" alt="Imagen de perfil">
  </section>
  <section class="projects" id="projects">
    <h2>Proyectos</h2>
    <div class="card">
      <img src="proyecto1.jpg" alt="Proyecto 1">
      <h2>Proyecto 1</h2>
      <p>Descripción del proyecto 1.</p>
    </div>
    <div class="card">
      <img src="proyecto2.jpg" alt="Proyecto 2">
      <h2>Proyecto 2</h2>
      <p>Descripción del proyecto 2.</p>
    </div>
  </section>
  <section class="skills" id="skills">
    <h2>Habilidades</h2>
    <p>HTML: <div class="progress-bar"><div class="progress" style="width: 90%;"></div></div></p>
    <p>CSS: <div class="progress-bar"><div class="progress" style="width: 80%;"></div></div></p>
    <p>JavaScript: <div class="progress-bar"><div class="progress" style="width: 70%;"></div></div></p>
  </section>
  <section class="contact" id="contact">
    <h2>Contacto</h2>
    <form>
      <input type="text" placeholder="Nombre">
      <input type="email" placeholder="Correo electrónico">
      <textarea placeholder="Mensaje"></textarea>
      <button class="btn">Enviar</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
